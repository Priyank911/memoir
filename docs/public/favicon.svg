<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Circular White Background with Black Border -->
  <circle cx="16" cy="16" r="14" fill="#ffffff" stroke="#000000" stroke-width="2" />
  
  <!-- Centered Pixel-art Game Cartridge -->
  <!-- Cartridge Outline -->
  <rect x="10" y="10" width="12" height="12" rx="1" fill="none" stroke="#000000" stroke-width="1" stroke-linejoin="miter" />
  <!-- Cartridge Top Ridge -->
  <path d="M 12 10 L 12 12 L 20 12 L 20 10" fill="none" stroke="#000000" stroke-width="1" stroke-linejoin="miter" />
  <!-- Cartridge Label Area -->
  <rect x="12" y="14" width="8" height="6" fill="none" stroke="#000000" stroke-width="1" stroke-linejoin="miter" />
  <!-- Cartridge Label Detail -->
  <rect x="14" y="16" width="4" height="2" fill="#000000" />
</svg>
