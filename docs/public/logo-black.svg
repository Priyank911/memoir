<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Outer Cartridge Border -->
  <rect x="5" y="5" width="22" height="23" rx="2" fill="none" stroke="#000000" stroke-width="2" stroke-linejoin="miter" />
  
  <!-- Top Ridge Indent -->
  <path d="M 9 5 L 9 9 L 23 9 L 23 5" fill="none" stroke="#000000" stroke-width="2" stroke-linejoin="miter" />
  
  <!-- Vertical grooves in the top ridge -->
  <path d="M 12 5 L 12 8 M 16 5 L 16 8 M 20 5 L 20 8" stroke="#000000" stroke-width="2" stroke-linecap="square" />
  
  <!-- Label border -->
  <rect x="9" y="12" width="14" height="11" fill="none" stroke="#000000" stroke-width="2" stroke-linejoin="miter" />
  
  <!-- Pixel Brain inside Label -->
  <!-- Left Lobe -->
  <rect x="11" y="14" width="4" height="3" fill="#000000" />
  <!-- Right Lobe -->
  <rect x="17" y="14" width="4" height="3" fill="#000000" />
  <!-- Connection / Stem -->
  <rect x="14" y="15" width="4" height="4" fill="#000000" />
  
  <!-- Small text line under brain -->
  <line x1="11" y1="20" x2="21" y2="20" stroke="#000000" stroke-width="1" />
</svg>
